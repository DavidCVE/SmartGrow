<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autentificare - SmartGrow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --secondary-green: #40916c;
            --light-green: #95d5b2;
            --pale-green: #d8f3dc;
            --bg-gradient: linear-gradient(135deg, #d8f3dc 0%, #b7e4c7 50%, #95d5b2 100%);
        }

        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background elements */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(45, 106, 79, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(64, 145, 108, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(149, 213, 178, 0.1) 0%, transparent 40%);
            z-index: 0;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            z-index: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 
                0 20px 60px rgba(45, 106, 79, 0.15),
                0 8px 25px rgba(0, 0, 0, 0.08);
            padding: 3rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--secondary-green) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 25px rgba(45, 106, 79, 0.3);
        }

        .login-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #6c757d;
            font-weight: 400;
        }

        /* Floating Labels Styling */
        .form-floating {
            margin-bottom: 1.25rem;
        }

        .form-floating > .form-control {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 1rem 1rem 1rem 3rem;
            height: 60px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f8faf9;
        }

        .form-floating > .form-control:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.1);
            background-color: white;
        }

        .form-floating > label {
            padding: 1rem 1rem 1rem 3rem;
            color: #6c757d;
        }

        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: var(--primary-green);
            transform: scale(0.85) translateY(-0.75rem) translateX(0.15rem);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            font-size: 1.1rem;
            z-index: 5;
            transition: color 0.3s ease;
        }

        .form-floating:focus-within .input-icon {
            color: var(--primary-green);
        }

        .input-group-wrapper {
            position: relative;
        }

        /* Remember me and forgot password */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }

        .form-check-input:checked {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
        }

        .form-check-input:focus {
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.15);
            border-color: var(--primary-green);
        }

        .form-check-label {
            color: #6c757d;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .forgot-link:hover {
            color: var(--secondary-green);
            text-decoration: underline;
        }

        /* Sign In Button */
        .btn-signin {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--secondary-green) 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(45, 106, 79, 0.4);
            background: linear-gradient(135deg, #245a42 0%, #357a5c 100%);
            color: white;
        }

        .btn-signin:active {
            transform: translateY(0);
        }

        .btn-signin i {
            margin-right: 0.5rem;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #adb5bd;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }

        .divider span {
            padding: 0 1rem;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e9ecef;
        }

        .login-footer p {
            color: #6c757d;
            font-size: 0.875rem;
            margin: 0;
        }

        .login-footer a {
            color: var(--primary-green);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .login-footer a:hover {
            color: var(--secondary-green);
            text-decoration: underline;
        }

        /* Brand footer */
        .brand-footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(45, 106, 79, 0.6);
            font-size: 0.8rem;
        }

        .brand-footer i {
            margin-right: 0.25rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .login-icon {
                width: 70px;
                height: 70px;
            }

            .login-icon i {
                font-size: 2rem;
            }

            .login-title {
                font-size: 1.35rem;
            }
        }

        /* Password visibility toggle */
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 0.25rem;
            z-index: 5;
            transition: color 0.2s ease;
        }

        .password-toggle:hover {
            color: var(--primary-green);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <h1 class="login-title">SmartGrow</h1>
                <p class="login-subtitle">Conectați-vă pentru a vă monitoriza sera</p>
            </div>

            <!-- Login Form -->
            <form action="#" method="POST">
                <!-- Email Input -->
                <div class="input-group-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <div class="form-floating">
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="nume@exemplu.com" 
                            required
                            autocomplete="email"
                        >
                        <label for="email">Adresă de Email</label>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="input-group-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <div class="form-floating">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            placeholder="Parolă" 
                            required
                            autocomplete="current-password"
                        >
                        <label for="password">Parolă</label>
                    </div>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Ține-mă minte</label>
                    </div>
                    <a href="#" class="forgot-link">Ați uitat parola?</a>
                </div>

                <!-- Sign In Button -->
                <button type="submit" class="btn btn-signin">
                    <i class="fas fa-sign-in-alt"></i>
                    Conectare
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Nu aveți un cont? <a href="#">Contactați administratorul</a></p>
            </div>
        </div>

        <!-- Brand Footer -->
        <div class="brand-footer">
            <i class="fas fa-seedling"></i>
            Sistem de Monitorizare SmartGrow &copy; 2026
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script>
        // Firebase configuration - PASTE YOUR KEYS HERE
        const firebaseConfig = {
  apiKey: "AIzaSyBClqsUEx1IoYFRb19auW-gxDT3OQKk828",
  authDomain: "proiectlicenta-da795.firebaseapp.com",
  databaseURL: "https://proiectlicenta-da795-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "proiectlicenta-da795",
  storageBucket: "proiectlicenta-da795.firebasestorage.app",
  messagingSenderId: "341619394858",
  appId: "1:341619394858:web:cddd410087d6bfbc3b7653",
  measurementId: "G-F7ZNKKVHSB"
};
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Handle login form submission
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.querySelector('form');
            const submitBtn = loginForm.querySelector('button[type="submit"]');

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                // Disable button and show loading state
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Se conectează...';

                try {
                    await firebase.auth().signInWithEmailAndPassword(email, password);
                    // Success - redirect to dashboard
                    window.location.href = '/dashboard';
                } catch (error) {
                    // Handle specific error codes
                    let errorMessage = 'An error occurred. Please try again.';
                    
                    switch (error.code) {
                        case 'auth/invalid-email':
                            errorMessage = 'Invalid email address format.';
                            break;
                        case 'auth/user-disabled':
                            errorMessage = 'This account has been disabled.';
                            break;
                        case 'auth/user-not-found':
                            errorMessage = 'No account found with this email.';
                            break;
                        case 'auth/wrong-password':
                            errorMessage = 'Incorrect password.';
                            break;
                        case 'auth/invalid-credential':
                            errorMessage = 'Invalid email or password.';
                            break;
                        case 'auth/too-many-requests':
                            errorMessage = 'Too many failed attempts. Please try again later.';
                            break;
                        default:
                            errorMessage = error.message;
                    }

                    alert(errorMessage);

                    // Reset button state
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Conectare';
                }
            });
        });
    </script>
</body>
</html>
