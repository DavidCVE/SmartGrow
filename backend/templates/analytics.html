<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistici - SmartGrow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --secondary-green: #40916c;
            --light-green: #95d5b2;
            --bg-light: #f8faf9;
            --card-shadow: 0 4px 15px rgba(45, 106, 79, 0.1);
            --border-radius: 16px;
        }

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            min-height: 100vh;
            visibility: hidden; /* Hidden until auth check completes */
        }

        /* Sidebar Styles */
        .sidebar {
            background: linear-gradient(180deg, var(--primary-green) 0%, var(--secondary-green) 100%);
            min-height: 100vh;
            width: 280px;
            position: fixed;
            left: 0;
            top: 0;
            padding: 2rem 1.5rem;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .sidebar-brand {
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-brand i {
            font-size: 2rem;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }

        .sidebar-nav .nav-link {
            color: rgba(255, 255, 255, 0.85);
            padding: 0.9rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .sidebar-nav .nav-link:hover,
        .sidebar-nav .nav-link.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .sidebar-nav .nav-link i {
            width: 24px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 2rem 2.5rem;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .page-subtitle {
            color: #6c757d;
            font-size: 0.95rem;
        }

        /* Section Cards */
        .section-card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            border: none;
            margin-bottom: 1.5rem;
            height: 100%;
        }

        .section-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a2e;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary-green);
        }

        .section-body {
            padding: 1.5rem;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .sidebar {
                width: 240px;
            }
            .main-content {
                margin-left: 240px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 1rem;
            }
            .mobile-toggle {
                display: block !important;
            }
        }

        .mobile-toggle {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1001;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Mobile Toggle Button -->
    <button class="mobile-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-leaf"></i>
            <span>SmartGrow</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-link">
                <i class="fas fa-tachometer-alt"></i>
                <span>Panou de Control</span>
            </a>
            <a href="/analytics" class="nav-link active">
                <i class="fas fa-chart-line"></i>
                <span>Statistici</span>
            </a>
            <a href="/settings" class="nav-link">
                <i class="fas fa-cog"></i>
                <span>Setări</span>
            </a>
            <a href="/alerts" class="nav-link">
                <i class="fas fa-bell"></i>
                <span>Alerte</span>
            </a>
            <a href="/history" class="nav-link">
                <i class="fas fa-history"></i>
                <span>Istoric</span>
            </a>
            <a href="/about" class="nav-link">
                <i class="fas fa-info-circle"></i>
                <span>Despre</span>
            </a>
            <a href="#" onclick="logout()" class="nav-link mt-5" style="color: #ff6b6b;"><i class="fas fa-sign-out-alt"></i> <span>Deconectare</span></a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Header -->
        <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h1 class="page-title">Statistici și Rapoarte</h1>
                <p class="page-subtitle">O analiză aprofundată a performanței serei tale</p>
            </div>
            <div>
                <!-- Time Range Filter -->
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-secondary active" id="btn-7d">7 Zile</button>
                    <button type="button" class="btn btn-outline-secondary" id="btn-30d">30 Zile</button>
                    <button type="button" class="btn btn-outline-secondary" id="btn-all">Toate</button>
                </div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="row g-4">
            <!-- Trend Chart Card -->
            <div class="col-xl-6 col-lg-12">
                <div class="section-card">
                    <div class="section-header">
                        <h6 class="section-title">
                            <i class="fas fa-chart-area"></i>
                            Tendințe Temperatură și Umiditate
                        </h6>
                    </div>
                    <div class="section-body">
                        <div class="chart-container">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pump Chart Card -->
            <div class="col-xl-6 col-lg-12">
                <div class="section-card">
                    <div class="section-header">
                        <h6 class="section-title">
                            <i class="fas fa-chart-bar"></i>
                            Statistici Utilizare Pompă
                        </h6>
                    </div>
                    <div class="section-body">
                        <div class="chart-container">
                            <canvas id="pumpChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-muted py-4 mt-4">
            <small>Sistem de Monitorizare SmartGrow &copy; 2026 | Proiect de Licență</small>
        </footer>
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart.js (Optional addition for future chart population) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // Firebase configuration - Copying from dashboard.html
        const firebaseConfig = {
            apiKey: "AIzaSyBClqsUEx1IoYFRb19auW-gxDT3OQKk828",
            authDomain: "proiectlicenta-da795.firebaseapp.com",
            databaseURL: "https://proiectlicenta-da795-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "proiectlicenta-da795",
            storageBucket: "proiectlicenta-da795.firebasestorage.app",
            messagingSenderId: "341619394858",
            appId: "1:341619394858:web:cddd410087d6bfbc3b7653",
            measurementId: "G-F7ZNKKVHSB"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        // Check authentication state - redirect if not logged in
        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                // No user is signed in, redirect to login
                window.location.href = '/';
            } else {
                // User is signed in, show the page
                document.body.style.visibility = 'visible';
                console.log('User authenticated:', user.email);
            }
        });

        function logout() { firebase.auth().signOut().then(() => { window.location.href = '/'; }); }

        /**
         * Toggle sidebar for mobile
         */
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // --- Chart Logic ---

        // Dummy Data Configurations
        const dummyData = {
            '7d': {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                temperature: [22, 23, 25, 24, 24, 26, 27],
                humidity: [55, 50, 48, 49, 52, 45, 43],
                pumpUsage: [2, 3, 1, 4, 2, 5, 3]
            },
            '30d': {
                labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                temperature: [21, 23, 24, 26],
                humidity: [60, 52, 48, 45],
                pumpUsage: [12, 15, 10, 18]
            },
            'all': {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                temperature: [15, 18, 20, 23, 26, 28],
                humidity: [70, 65, 60, 55, 50, 45],
                pumpUsage: [30, 35, 40, 50, 65, 80]
            }
        };

        let trendChartInstance = null;
        let pumpChartInstance = null;

        function initCharts() {
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            const pumpCtx = document.getElementById('pumpChart').getContext('2d');

            trendChartInstance = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: dummyData['7d'].labels,
                    datasets: [
                        {
                            label: 'Temperature (°C)',
                            data: dummyData['7d'].temperature,
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'Humidity (%)',
                            data: dummyData['7d'].humidity,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false }
                }
            });

            pumpChartInstance = new Chart(pumpCtx, {
                type: 'bar',
                data: {
                    labels: dummyData['7d'].labels,
                    datasets: [{
                        label: 'Pump Usage (times)',
                        data: dummyData['7d'].pumpUsage,
                        backgroundColor: 'rgba(151, 117, 250, 0.8)',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function updateCharts(timeframe) {
            const data = dummyData[timeframe];

            // Update Trend Chart
            trendChartInstance.data.labels = data.labels;
            trendChartInstance.data.datasets[0].data = data.temperature;
            trendChartInstance.data.datasets[1].data = data.humidity;
            trendChartInstance.update();

            // Update Pump Chart
            pumpChartInstance.data.labels = data.labels;
            pumpChartInstance.data.datasets[0].data = data.pumpUsage;
            pumpChartInstance.update();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();

            const btn7d = document.getElementById('btn-7d');
            const btn30d = document.getElementById('btn-30d');
            const btnAll = document.getElementById('btn-all');
            const btns = [btn7d, btn30d, btnAll];

            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    btns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');

                    if (e.target.id === 'btn-7d') updateCharts('7d');
                    if (e.target.id === 'btn-30d') updateCharts('30d');
                    if (e.target.id === 'btn-all') updateCharts('all');
                });
            });
        });
    </script>
</body>
</html>
